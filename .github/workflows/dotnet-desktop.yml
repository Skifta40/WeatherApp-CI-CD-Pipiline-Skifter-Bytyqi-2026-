name: .NET Weather App CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, closed ]
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Restore Dependencies
      working-directory: ./WeatherApp
      run: dotnet restore

    - name: Build Application
      working-directory: ./WeatherApp
      run: dotnet build --no-restore --configuration Release

    - name: Run Automated Tests
      working-directory: ./WeatherApp
      run: dotnet test --no-build --verbosity normal --configuration Release

  deploy-preview:
    needs: build-and-test
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Simulate Ephemeral Container Build
      env:
        ASNETCORE_ENVIRONMENT: Development
        OpenMeteo__BaseUrl: ${{ vars.OPENCAGE__BASEURL}}
        OpenCage__BaseUrl: ${{ vars.OPENCAGE__BASEURL}}
        GeoCodeAPI__ApiKey: ${{ secrets.GEOCODEAPI__APIKEY }}
      run: |
        echo "Building isolated runtime environment for PR #${{ github.event.number }}..."
        echo "Preview Target URL: https://preview-pr-${{ github.event.number }}.weatherapp.local"

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
    - name: Tear Down Preview Resources
      run: |
        echo "PR #${{ github.event.number }} closed. Evicting temporary resources to eliminate costs."

  deploy-to-production:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    environment:
      name: Production
      url: https://weatherapp.skifta.me

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Publish Production Binaries
      working-directory: ./YOUR_FOLDER_NAME
      run: dotnet publish -c Release -o ./publish

    - name: Production Deployment & Variable Injection
      env:
        ASNETCORE_ENVIRONMENT: Production
        OpenMeteo__BaseUrl: "https://api.open-meteo.com/v1"
        OpenCage__BaseUrl: "https://api.opencagedata.com/geocode/v1"
        GeoCodeAPI__ApiKey: ${{ secrets.geocodeKey }}
      run: |
        echo "Injecting enterprise secrets from repository vault..."
        echo "Production sync complete. Site is live."